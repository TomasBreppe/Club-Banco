      </a>
    </nav>

  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <h5 class="page-title m-0">CLUB BANCO</h5>
      </div>

      <div class="topbar-center">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input
            type="text"
            class="form-control"
            placeholder="Búsqueda de socio"
            [(ngModel)]="searchText"
            (keyup.enter)="buscarSocio()"
          />
        </div>
      </div>

      <div class="topbar-right">
        <button class="icon-btn" type="button" title="Notificaciones">
          <i class="bi bi-bell-fill"></i>
        </button>

        <div class="user-dropdown">
          <button class="user-btn" type="button" (click)="toggleUserMenu()">
            <div class="avatar">
              <img
                *ngIf="perfil?.fotoUrl; else iconoDefault"
                [src]="perfil?.fotoUrl"
                alt="Foto de perfil"
                style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%"
              />

              <ng-template #iconoDefault>
                <i class="bi bi-person-circle"></i>
              </ng-template>
            </div>

            <div class="user-info">
              <div class="user-name">
                {{ perfil?.nombre || 'Administrador' }}
                {{ perfil?.apellido || '' }}
              </div>
              <div class="user-role">
                {{ perfil?.email || 'Club Banco' }}
              </div>
            </div>

            <i class="bi bi-chevron-down chevron" [class.rotate]="userMenuOpen"></i>
          </button>

          <div class="user-menu" *ngIf="userMenuOpen">
            <button type="button" class="dropdown-link" (click)="editarPerfil()">
              Editar Perfil
            </button>

            <button type="button" class="dropdown-link" (click)="cambiarPassword()">
              Cambiar Contraseña
            </button>

            <button type="button" class="dropdown-link" (click)="actualizarFoto()">
              Actualizar Foto de Perfil
            </button>

            <hr />

            <button type="button" class="dropdown-link danger" (click)="logout()">
              Cerrar Sesión
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="content">
      <div class="content-inner">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
