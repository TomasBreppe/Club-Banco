<div class="card shadow-sm">
  <div class="card-header">
    <h4 class="m-0">Editar Perfil</h4>
  </div>

  <div class="card-body">
    <div *ngIf="mensaje" class="alert alert-success">
      {{ mensaje }}
    </div>

    <form (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="form.nombre"
            name="nombre"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Apellido</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="form.apellido"
            name="apellido"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            [(ngModel)]="form.email"
            name="email"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Teléfono</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="form.telefono"
            name="telefono"
          />
        </div>
      </div>

      <div class="mt-4 d-flex justify-content-end">
        <button class="btn btn-primary" type="submit" [disabled]="guardando">
          <span *ngIf="guardando" class="spinner-border spinner-border-sm me-2"></span>
          Guardar cambios
        </button>
      </div>
    </form>
  </div>
</div>
