<div class="card shadow-sm">
  <div class="card-header">
    <h4 class="m-0">Cambiar Contraseña</h4>
  </div>

  <div class="card-body">
    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <div *ngIf="mensaje" class="alert alert-success">
      {{ mensaje }}
    </div>

    <form (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Contraseña actual</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="form.currentPassword"
            name="currentPassword"
            [disabled]="guardando"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Nueva contraseña</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="form.newPassword"
            name="newPassword"
            [disabled]="guardando"
          />
          <small class="text-muted">Debe tener al menos 8 caracteres.</small>
        </div>

        <div class="col-md-6">
          <label class="form-label">Repetir nueva contraseña</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="form.repetir"
            name="repetir"
            [disabled]="guardando"
          />
        </div>
      </div>

      <div class="mt-4 d-flex justify-content-end">
        <button class="btn btn-primary" type="submit" [disabled]="guardando">
          <span *ngIf="guardando" class="spinner-border spinner-border-sm me-2"></span>
          {{ guardando ? 'Actualizando...' : 'Actualizar contraseña' }}
        </button>
      </div>
    </form>
  </div>
</div>
