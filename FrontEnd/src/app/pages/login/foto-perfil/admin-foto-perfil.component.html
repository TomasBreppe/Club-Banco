<div class="card shadow-sm">
  <div class="card-header">
    <h4 class="m-0">Actualizar Foto de Perfil</h4>
  </div>

  <div class="card-body">
    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <div *ngIf="mensaje" class="alert alert-success">
      {{ mensaje }}
    </div>

    <div class="mb-3">
      <label class="form-label">URL de la imagen</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="fotoUrl"
        name="fotoUrl"
        placeholder="https://..."
        [disabled]="guardando"
      />
      <small class="text-muted">
        Pegá la dirección completa de la imagen. Debe empezar con http:// o https://
      </small>
    </div>

    <div *ngIf="fotoUrl" class="mb-3">
      <label class="form-label d-block">Vista previa</label>
      <img
        [src]="fotoUrl"
        alt="Vista previa"
        style="width: 140px; height: 140px; object-fit: cover; border-radius: 50%; border: 1px solid #ddd;"
      />
    </div>

    <div class="d-flex justify-content-end">
      <button class="btn btn-primary" type="button" (click)="guardar()" [disabled]="guardando">
        <span *ngIf="guardando" class="spinner-border spinner-border-sm me-2"></span>
        {{ guardando ? 'Guardando...' : 'Guardar foto' }}
      </button>
    </div>
  </div>
</div>
